services:
  paperless-mcp:
    build:
      context: ./mcp
      dockerfile: Dockerfile
      args:
        - GIT_SHA=${GIT_SHA:-unknown}
    container_name: paperless-mcp
    restart: unless-stopped
    ports:
      - "8013:8013"
    environment:
      PAPERLESS_URL: ${PAPERLESS_URL:-http://192.168.7.203:8000}
      PAPERLESS_API_TOKEN: ${PAPERLESS_API_TOKEN:-}
